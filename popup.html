<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300, initial-scale=1.0">
  <title>Angular Form AutoFill</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #333;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon {
      width: 24px;
      height: 24px;
      background: #1976d2;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .toggle-row label {
      cursor: pointer;
      user-select: none;
      flex: 1;
    }
    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      min-width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider {
      background: #1976d2;
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }
    .btn-primary {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #1976d2;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1565c0; }
    .btn-primary:active { background: #0d47a1; }
    .btn-primary:disabled { background: #90caf9; cursor: not-allowed; }
    .btn-secondary {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #1976d2;
      background: #e3f2fd;
      border: 1px solid #bbdefb;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: #bbdefb; }
    .btn-secondary:active { background: #90caf9; }
    .btn-danger {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #c62828;
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-danger:hover { background: #ffcdd2; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
      text-align: center;
    }
    #status.success { color: #2e7d32; }
    #status.error { color: #c62828; }
    .shortcut-hint {
      margin-top: 8px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    .shortcut-hint kbd {
      background: #e0e0e0;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
    }
    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 14px 0;
    }
    /* Section header */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }
    /* Payload status */
    #payload-status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }
    #payload-status.listening { color: #f9a825; }
    #payload-status.captured { color: #2e7d32; }
    #payload-status.warning { color: #e65100; }
    #payload-status.error { color: #c62828; }
    /* Button group */
    .btn-group {
      display: none;
      margin-top: 8px;
    }
    .btn-group.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h1>
    <span class="icon">AF</span>
    Angular Form AutoFill
  </h1>

  <!-- ── Feature 1: Auto-fill ── -->
  <div class="toggle-row">
    <label for="required-toggle">Fill all fields (not just required)</label>
    <div class="switch">
      <input type="checkbox" id="required-toggle">
      <span class="slider"></span>
    </div>
  </div>

  <button id="fill-btn" class="btn-primary">Fill Required Fields</button>
  <div id="status"></div>
  <div class="shortcut-hint">Shortcut: <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>F</kbd></div>

  <!-- ── Feature 2: Record Payload ── -->
  <hr class="divider">
  <div class="section-title">API Payload Recorder</div>

  <div class="toggle-row">
    <label for="record-toggle">Record Payload on Submit</label>
    <div class="switch">
      <input type="checkbox" id="record-toggle">
      <span class="slider"></span>
    </div>
  </div>

  <div id="payload-status"></div>

  <div id="payload-actions" class="btn-group">
    <button id="download-btn" class="btn-secondary">Download Payload (JSON)</button>
    <button id="clear-btn" class="btn-danger">Clear Recording</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
